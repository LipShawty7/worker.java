version: "3.8"

services:

  worker-email:
    build: .
    environment:
      - QUEUE=email
      - POLLING_INTERVAL=3000
      - API_URL=http://localhost:3000       # nome do serviço da sua API no compose
      - EMAIL_USER=seu_email@gmail.com
      - EMAIL_PASS=sua_senha_de_app
    deploy:
      replicas: 2
    restart: unless-stopped
    depends_on:
      - api                            # remova se a API rodar fora do compose

  # ─── Exemplo de API (substitua pela sua) ──────────────────────────────────
  # api:
  #   image: sua-api-image
  #   ports:
  #     - "8080:8080"
